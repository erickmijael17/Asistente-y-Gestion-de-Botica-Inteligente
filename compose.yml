services:
  botica-postgres:
    image: postgres:16
    container_name: botica-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-botica_inteligente_db}
      POSTGRES_USER: ${POSTGRES_USER:-botica_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-botica_password}
    ports:
      - "5432:5432"
    volumes:
      - botica_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-botica_user} -d ${POSTGRES_DB:-botica_inteligente_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  botica-keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: botica-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8081:8080"
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import:ro

volumes:
  botica_postgres_data:
