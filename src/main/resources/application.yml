server:
  port: 8080

spring:
  application:
    name: BoticaAmanecer
  datasource:
    url: jdbc:postgresql://localhost:5432/botica_amanecer
    username: postgres
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
